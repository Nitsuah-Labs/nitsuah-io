name: Playwright Nightly

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application for tests
        run: npm run build:ci
        env:
          NEXT_PUBLIC_TEST_HELPERS: 1
          NODE_ENV: production

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright browser tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_WORKERS: 1
          NEXT_PUBLIC_TEST_HELPERS: 1
          NODE_ENV: production
          FORCE_BROWSER_E2E: 1

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-nightly
          path: playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots-nightly
          path: test-results/
          retention-days: 7
